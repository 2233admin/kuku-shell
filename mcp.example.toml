# Kuku MCP Server 配置
# 把这个文件复制到 ~/.config/kuku/mcp.toml 然后按需修改
#
# 每个 [servers.名字] 是一个 MCP server
# command: 可执行文件路径
# args: 命令行参数
# env: 环境变量

# 示例：文件系统 MCP server
# [servers.filesystem]
# command = "npx"
# args = ["-y", "@modelcontextprotocol/server-filesystem", "D:/projects"]

# 示例：Git MCP server
# [servers.git]
# command = "npx"
# args = ["-y", "@modelcontextprotocol/server-git"]

# 示例：自定义 MCP server
# [servers.myserver]
# command = "python"
# args = ["-m", "my_mcp_server"]
# env = { MY_API_KEY = "xxx" }
